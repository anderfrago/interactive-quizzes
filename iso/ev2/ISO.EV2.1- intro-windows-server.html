<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Quiz: Introducción a Windows Server</title>
    <style>
        :root { --p: #6366f1; --s: #475569; --bg: #f3f4f6; --txt: #1f2937; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--txt); display: flex; justify-content: center; padding: 20px; }
        #q-box { background: white; max-width: 800px; width: 100%; padding: 2.5rem; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .progress { height: 10px; background: #e5e7eb; border-radius: 5px; margin: 1.5rem 0; overflow: hidden; }
        #bar { height: 100%; background: var(--p); width: 0%; transition: 0.4s ease; }
        .opt { display: block; width: 100%; padding: 1rem; margin: 0.7rem 0; border: 2px solid #f3f4f6; border-radius: 8px; text-align: left; cursor: pointer; background: #fff; font-size: 1rem; transition: 0.2s; }
        .opt:hover { border-color: var(--p); background: #eef2ff; }
        .correct { background: #dcfce7 !important; border-color: #22c55e !important; color: #166534; font-weight: 600; }
        .wrong { background: #fee2e2 !important; border-color: #ef4444 !important; color: #991b1b; }
        #next { background: var(--p); color: white; border: none; padding: 1rem 2.5rem; border-radius: 6px; cursor: pointer; float: right; display: none; font-weight: 600; }
        #results { display: none; text-align: center; }
        .badge { background: #eef2ff; color: var(--p); padding: 4px 12px; border-radius: 15px; font-size: 0.8rem; font-weight: bold; }
    </style>
</head>
<body>

<div id="q-box">
    <div id="quiz-area">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <span class="badge">Windows Server & Discos</span>
            <span id="counter" style="color: var(--s); font-size: 0.85rem;"></span>
        </div>
        <h2 style="margin: 1rem 0; color: #312e81;">Administración de Windows Server</h2>
        <div class="progress"><div id="bar"></div></div>
        <h3 id="question"></h3>
        <div id="options"></div>
        <button id="next" onclick="loadNext()">Siguiente</button>
    </div>

    <div id="results">
        <h2 style="color:var(--p)">Resultados de la Evaluación</h2>
        <div style="font-size: 4rem; margin: 1.5rem 0; font-weight: bold;" id="score-val"></div>
        <p id="eval-msg" style="margin-bottom: 2rem;"></p>
        <button onclick="location.reload()" style="padding: 1rem 2rem; background: var(--p); color:white; border:none; border-radius:6px; cursor:pointer;">Reiniciar Quiz</button>
    </div>
</div>

<script>
    const data = [
        { q: "¿Cuál es la principal diferencia entre las versiones Standard y Datacenter de Windows Server?", a: ["Standard no tiene interfaz gráfica", "Datacenter permite virtualización ilimitada de instancias de Windows Server", "Standard solo admite un disco duro", "Datacenter es solo para modo texto"], c: 1 },
        { q: "¿Qué opción de instalación consume menos recursos al omitir la interfaz gráfica?", a: ["Servidor con GUI", "Experiencia de escritorio", "Server Core", "Instalación completa"], c: 2 },
        { q: "¿Cuál es el sistema de archivos recomendado por defecto para Windows Server?", a: ["FAT32", "NTFS", "EXT4", "HPFS"], c: 1 },
        { q: "¿Qué es un 'Disco Básico'?", a: ["Un disco que no permite particiones", "Un disco físico que contiene particiones primarias y extendidas", "Un disco virtual en la nube", "Un disco sin formato"], c: 1 },
        { q: "¿Qué caracteriza a un 'Disco Dinámico'?", a: ["Es más lento que el básico", "Permite crear volúmenes que se extienden por varios discos físicos", "Solo funciona en Windows 98", "No permite usar NTFS"], c: 1 },
        { q: "¿Qué sucede con los datos al convertir un disco básico en dinámico?", a: ["Se borran todos los datos", "Se mantienen los datos (pero es recomendable copia de seguridad)", "El disco se bloquea", "Se requiere formatear"], c: 1 },
        { q: "¿Qué es un 'Volumen Distribuido'?", a: ["Un volumen que suma el espacio de varios discos (hasta 32) de forma secuencial", "Un volumen que hace espejo de los datos", "Un volumen para instalar solo juegos", "Un volumen que mejora la velocidad de lectura"], c: 0 },
        { q: "¿Qué es un 'Volumen Seccionado' (RAID-0)?", a: ["Escribe datos en bandas en varios discos para aumentar la velocidad", "Crea una copia exacta en dos discos", "Protege contra fallos de disco", "Solo usa un disco físico"], c: 0 },
        { q: "¿Qué ocurre si falla un disco en un Volumen Seccionado (RAID-0)?", a: ["El sistema sigue funcionando", "Se pierden todos los datos del volumen", "Solo se pierde la mitad de la información", "El sistema lo repara automáticamente"], c: 1 },
        { q: "¿Qué es un 'Volumen Reflejado' (RAID-1)?", a: ["Suma el tamaño de dos discos", "Duplica los datos en dos discos físicos para tolerancia a fallos", "Es el más rápido de todos", "No necesita discos dinámicos"], c: 1 },
        { q: "¿Cuántos discos físicos se necesitan como mínimo para un Volumen Reflejado?", a: ["1", "2", "3", "5"], c: 1 },
        { q: "¿Qué consola se utiliza para gestionar particiones y volúmenes?", a: ["services.msc", "diskmgmt.msc (Administración de discos)", "compmgmt.msc", "eventvwr.msc"], c: 1 },
        { q: "¿Qué es un Volumen RAID-5?", a: ["Una copia espejo simple", "Datos y paridad distribuidos en al menos 3 discos", "Solo para copias de seguridad", "Un disco básico"], c: 1 },
        { q: "¿Qué es una Copia de Seguridad 'Normal' o Total?", a: ["Copia solo lo que ha cambiado hoy", "Copia todos los archivos seleccionados y los marca como copiados", "No marca los archivos", "Copia solo archivos de sistema"], c: 1 },
        { q: "¿Qué diferencia a la Copia de Seguridad 'Incremental'?", a: ["Copia todo cada vez", "Copia solo archivos creados o cambiados desde la última copia normal o incremental", "Borra el disco de destino", "Es la más lenta"], c: 1 },
        { q: "¿Qué es la Copia de Seguridad 'Diferencial'?", a: ["Copia archivos cambiados desde la última copia normal y NO los marca como copiados", "Copia todo el sistema operativo", "Es lo mismo que la incremental", "Solo copia fotos"], c: 0 },
        { q: "Para restaurar una copia diferencial necesitas:", a: ["Solo la última diferencial", "La última copia normal y la última diferencial", "Todas las copias diferenciales", "Solo la copia incremental"], c: 1 },
        { q: "¿Qué herramienta se usa para programar copias automáticas en Windows Server?", a: ["Paint", "Copias de seguridad de Windows Server (Windows Server Backup)", "Calculadora", "Bloc de notas"], c: 1 },
        { q: "¿A qué se refiere el término 'Tolerancia a fallos'?", a: ["A que el usuario no cometa errores", "A la capacidad del sistema de seguir funcionando tras el fallo de un componente hardware", "A que la batería dure más", "A no necesitar contraseñas"], c: 1 },
        { q: "Un disco 'Sin inicializar' en la consola de discos aparece con una barra de color:", a: ["Azul", "Negra", "Roja", "Verde"], c: 1 }
    ];

    let current = 0, score = 0, canClick = true;

    function render() {
        canClick = true;
        const qData = data[current];
        document.getElementById('question').innerText = qData.q;
        document.getElementById('counter').innerText = `Pág. ${current + 1} / ${data.length}`;
        document.getElementById('bar').style.width = `${((current + 1) / data.length) * 100}%`;
        
        const optCont = document.getElementById('options');
        optCont.innerHTML = '';
        qData.a.forEach((txt, i) => {
            const b = document.createElement('button');
            b.className = 'opt';
            b.innerText = txt;
            b.onclick = () => check(i, b);
            optCont.appendChild(b);
        });
        document.getElementById('next').style.display = 'none';
    }

    function check(i, btn) {
        if (!canClick) return;
        canClick = false;
        const correct = data[current].c;
        const all = document.querySelectorAll('.opt');
        if (i === correct) {
            btn.classList.add('correct');
            score++;
        } else {
            btn.classList.add('wrong');
            all[correct].classList.add('correct');
        }
        document.getElementById('next').style.display = 'block';
    }

    function loadNext() {
        current++;
        if (current < data.length) render();
        else {
            document.getElementById('quiz-area').style.display = 'none';
            document.getElementById('results').style.display = 'block';
            document.getElementById('score-val').innerText = `${score} / ${data.length}`;
            const m = document.getElementById('eval-msg');
            if(score >= 17) m.innerText = "¡Nivel Administrador! Dominas la gestión de servidores y discos.";
            else if(score >= 12) m.innerText = "Buen conocimiento de Windows Server, repasa los tipos de RAID.";
            else m.innerText = "Repasa los conceptos de discos dinámicos y estrategias de backup.";
        }
    }

    render();
</script>
</body>
</html>
